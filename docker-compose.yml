
services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend API
  # ──────────────────────────────────────────────────────────────────────────────
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkinsons_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=prod
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_BASE_URL=http://localhost:5173
      - DATABASE_URL=sqlite+aiosqlite:///./data/prod.db
    depends_on:
      - redis
    volumes:
      # Mount models folder so API can access the latest trained PKL files
      - ./backend/models:/app/models:ro
      - ./backend/data:/app/data:rw

  # ──────────────────────────────────────────────────────────────────────────────
  # Frontend Web App
  # ──────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Hardcode the API path to the local proxy/port during build
        - VITE_API_BASE_URL=http://localhost:8000/api/v1
    container_name: parkinsons_web
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ──────────────────────────────────────────────────────────────────────────────
  # Redis Cache & Rate Limiting
  # ──────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parkinsons_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:
